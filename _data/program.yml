  - time: 10:30 – 11:05
    session: Invited Talk II
  - time: 11:05 – 11:45
    session: Accepted Paper Session II (3 papers; 10 min + 3 min Q/A each)
  - time: 11:45 – 12:15
    session: Panel Discussion
  - time: 12:15 – 12:30
