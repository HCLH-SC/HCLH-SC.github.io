intro: The workshop will feature invited talks, peer-reviewed paper presentations, and a panel discussion. A tentative schedule can be found below.
schedule:
  - time: 09:00 – 09:10
    session: Welcome and Introductory Remarks (Organizing Committee)
    # 10 min
  - time: 09:10 – 09:40
    session: Invited Talk I
    # 30 min (25 min talk + 5 min Q/A)
  - time: 09:40 – 10:15
    session: "Accepted Papers: Session I"
    # 35 min (2 papers × 13 min + ~9 min buffer/transitions)
  - time: 10:15 – 10:30
    session: Break
    # 15 min
  - time: 10:30 – 11:00
    session: Invited Talk II
    # 30 min (25 min talk + 5 min Q/A)
  - time: 11:00 – 11:30
    session: "Accepted Papers: Session II"
    # 30 min (2 papers × 13 min + ~4 min buffer/transitions)
  - time: 11:30 – 12:20
    session: Panel Discussion
    # 50 min
  - time: 12:20 – 12:30
    session: Concluding Remarks and Open Discussion
    # 10 min
